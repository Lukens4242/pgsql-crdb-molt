global:
  scrape_interval: 5s

scrape_configs:
- job_name: replicator_forward
  metrics_path: /_/varz
  static_configs:
  - targets: ['replicator_forward:30055']
- job_name: replicator_reverse
  metrics_path: /_/varz
  static_configs:
  - targets: ['replicator_reverse:30056']
- job_name: molt_fetch
  metrics_path: /metrics
  static_configs:
  - targets: ['molt_fetch:3030']