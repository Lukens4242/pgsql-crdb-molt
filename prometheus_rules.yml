groups:
  - name: replicator_alerts
    rules:
      - alert: SourceLagCritical
        expr: source_lag_seconds > 60
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Replication source lag is {{ $value }}s (threshold: 60s)"
          description: "The replicator is falling behind the source WAL. Check replicator health and target apply throughput."

      - alert: TargetLagWarning
        expr: target_lag_seconds > 30
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "Replication target lag is {{ $value }}s (threshold: 30s)"
          description: "The target database is lagging behind. Check CockroachDB write throughput and replicator staging."

      - alert: ApplyErrorsCritical
        expr: rate(apply_errors_total[5m]) > 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Replicator apply errors detected ({{ $value }}/s)"
          description: "Mutations are failing to apply to the target database. Risk of data loss."

      - alert: StageErrorsWarning
        expr: rate(stage_errors_total[5m]) > 0
        for: 1m
        labels:
          severity: warning
        annotations:
          summary: "Replicator staging errors detected ({{ $value }}/s)"
          description: "Mutations are failing at the staging phase. Check source connectivity and WAL slot health."

      - alert: HighPoolDialLatency
        expr: histogram_quantile(0.99, rate(pool_dial_latency_seconds_bucket[5m])) > 1
        for: 3m
        labels:
          severity: warning
        annotations:
          summary: "P99 connection pool dial latency is {{ $value }}s (threshold: 1s)"
          description: "Database connection pool is experiencing high latency. Check network and database load."
